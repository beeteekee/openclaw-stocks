<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析 - OpenClaw（AI分析）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            min-width: 320px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 20px 15px;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-dot.connected { background: #28a745; }
        .status-dot.disconnected { background: #dc3545; }
        .status-dot.busy { background: #ffc107; }
        .status-dot.error { background: #dc3545; }

        .result-section {
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            overflow-x: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            max-width: 100%;
        }

        .error-message {
            color: #dc3545;
            background: #f8d7da;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }

        .examples {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .example {
            background: #e9ecef;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .data-source {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            font-size: 13px;
        }

        .data-source strong {
            font-weight: 600;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px 10px;
                border-radius: 12px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 12px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .result-section {
                font-size: 13px;
                padding: 12px;
                word-break: break-all;
                max-height: 500px;
            }

            .status-bar {
                font-size: 12px;
                padding: 10px;
            }

            .examples {
                gap: 6px;
            }

            .example {
                font-size: 12px;
                padding: 6px 12px;
            }

            .data-source {
                font-size: 11px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 股票分析 - OpenClaw</h1>
        <div class="subtitle">基于OpenClaw的AI分析，仅供娱乐</div>

        <div class="data-source">
            <strong>✅ 数据来源</strong>：Tushare真实行情数据 |
            <strong>✅ 分析标准</strong>：OpenClaw AI分析 |
            <strong>✅ 评分</strong>：行业成长 + 财务质量 + 技术面 + 缠论买点
        </div>

        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">正在检查服务器...</span>
        </div>

        <div class="input-section">
            <label for="stockInput" style="display:block; margin-bottom:8px; font-weight:600;">输入股票代码或名称</label>
            <div class="input-group">
                <input type="text" id="stockInput" placeholder="例如：002594.SZ 或 比亚迪" />
                <button id="analyzeBtn" onclick="analyze()">开始分析</button>
            </div>
            <div class="examples">
                <span class="example" onclick="quickSelect('002594.SZ')">002594.SZ (比亚迪)</span>
                <span class="example" onclick="quickSelect('600519.SH')">600519.SH (贵州茅台)</span>
                <span class="example" onclick="quickSelect('300750.SZ')">300750.SZ (宁德时代)</span>
                <span class="example" onclick="quickSelect('比亚迪')">比亚迪</span>
            </div>
            <p style="margin-top: 12px; font-size: 12px; color: #666;">
                💡 <strong>提示</strong>：分析需要30-60秒，请耐心等待。建议使用完整代码格式（如：002594.SZ）
            </p>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div class="result-section" id="result">
            <p style="color: #999; text-align: center; margin-top: 100px;">请在上方输入股票代码进行分析</p>
        </div>
    </div>

    <script>
        const stockInput = document.getElementById('stockInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const result = document.getElementById('result');
        const errorContainer = document.getElementById('errorContainer');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // OpenClaw Gateway 配置
        const GATEWAY_URL = 'http://localhost:18789/v1/chat/completions';
        // 如果通过外网访问，使用完整URL
        // const GATEWAY_URL = 'http://stockbot.nat100.top/v1/chat/completions';
        
        // Agent 配置
        const AGENT_MODEL = 'openclaw:stock-analysis';
        
        // 认证 Token（从 Gateway 配置中获取）
        const AUTH_TOKEN = '2047e3763a3a15acfb3ef96e3c40eac23a59500c9c3f436b';

        // 请求超时时间（2分钟）
        const REQUEST_TIMEOUT = 120000;

        let progressInterval = null;

        // 规范化股票代码格式
        function normalizeStockCode(code) {
            // 去除前后空格并转大写
            code = code.trim().toUpperCase();

            // 如果已经包含后缀，直接返回
            if (code.endsWith('.SZ') || code.endsWith('.SH')) {
                return code;
            }

            // 如果是6位纯数字，自动补充后缀
            if (/^\d{6}$/.test(code)) {
                const firstDigit = code.charAt(0);
                if (firstDigit === '0' || firstDigit === '2' || firstDigit === '3') {
                    return code + '.SZ';  // 深圳股票
                } else if (firstDigit === '6') {
                    return code + '.SH';  // 上海股票
                }
            }

            // 不是6位数字，可能是股票名称或其他格式，直接返回原值
            return code;
        }

        async function analyze() {
            const stock = stockInput.value.trim();

            if (!stock) {
                showError('请输入股票代码或名称');
                return;
            }

            // 规范化股票代码
            const normalizedStock = normalizeStockCode(stock);
            if (normalizedStock !== stock) {
                // 如果代码被规范化，更新输入框显示
                stockInput.value = normalizedStock;
            }

            setLoading(true);
            hideError();
            startProgress();

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                }, REQUEST_TIMEOUT);

                const response = await fetch(GATEWAY_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + AUTH_TOKEN
                    },
                    body: JSON.stringify({
                        model: AGENT_MODEL,
                        messages: [
                            {
                                role: 'user',
                                content: `分析股票：${normalizedStock}`
                            }
                        ]
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error('HTTP 错误: ' + response.status);
                }

                const data = await response.json();

                if (data.choices && data.choices.length > 0) {
                    const content = data.choices[0].message.content;
                    result.textContent = content;
                    updateStatus('connected', '分析完成');
                } else {
                    showError('分析失败：未收到响应');
                    updateStatus('error', '分析失败');
                }
            } catch (error) {
                console.error('请求失败:', error);

                if (error.name === 'AbortError') {
                    showError('请求超时（2分钟），请重试或检查服务器状态');
                    updateStatus('error', '请求超时');
                } else {
                    showError('请求失败：' + error.message + '\n\n请确保 OpenClaw Gateway 正在运行');
                    updateStatus('error', '网络错误');
                }
            } finally {
                stopProgress();
                setLoading(false);
            }
        }

        function startProgress() {
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            let progress = 0;

            progressInterval = setInterval(() => {
                progress += 1;
                if (progress <= 95) {
                    progressFill.style.width = progress + '%';
                }
            }, 600); // 每0.6秒增加1%（约60秒完成）
        }

        function stopProgress() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            progressFill.style.width = '100%';
            setTimeout(() => {
                progressBar.style.display = 'none';
            }, 2000);
        }

        function updateStatus(status, text) {
            statusDot.className = 'status-dot ' + status;
            statusText.textContent = text;
        }

        function setLoading(loading) {
            analyzeBtn.disabled = loading;
            analyzeBtn.textContent = loading ? '分析中...' : '开始分析';
        }

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function hideError() {
            errorContainer.innerHTML = '';
        }

        function quickSelect(stock) {
            stockInput.value = stock;
            stockInput.focus();
        }

        // 回车键快捷分析
        stockInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyze();
            }
        });

        // 页面加载时检查连接
        window.onload = function() {
            // 测试 Gateway 连接
            fetch(GATEWAY_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + AUTH_TOKEN
                },
                body: JSON.stringify({
                    model: AGENT_MODEL,
                    messages: [
                        {
                            role: 'user',
                            content: '你好'
                        }
                    ],
                    max_tokens: 10
                })
            })
            .then(response => {
                if (response.ok) {
                    updateStatus('connected', 'Gateway 服务器正常');
                } else {
                    throw new Error('Gateway 返回错误状态: ' + response.status);
                }
            })
            .catch(err => {
                console.error('连接测试失败:', err);
                updateStatus('disconnected', 'Gateway 服务器不可用 - 请检查配置');
            });
        };
    </script>
</body>
</html>
