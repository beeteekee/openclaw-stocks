<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 股票分析 - OpenClaw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #666666 0%, #888888 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            min-width: 320px;
        }

        .container {
            background: #f5f5f5;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 20px 15px;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .emoji-icon {
            font-size: 48px;
            display: block;
            margin: 0 auto 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .status-bar {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.connected {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        .status-dot.disconnected {
            background: #f44336;
        }

        .status-dot.connecting {
            background: #ff9800;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 12px;
            min-height: 100px;
        }

        /* 统一股票卡片样式 - 用于今日精选和查询统计 */
        .stock-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .stock-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #4CAF50;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(76, 175, 80, 0.3);
        }

        .stock-card.gold-theme:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFD700;
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.4);
        }

        .stock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stock-rank {
            font-size: 24px;
            color: #4CAF50;
            text-shadow: 0 2px 8px rgba(76, 175, 80, 0.4);
        }

        .stock-info-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stock-info-left .stock-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white !important;
        }

        .stock-info-left .stock-code {
            font-size: 13px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            border-left: none;
            color: rgba(255, 255, 255, 0.9);
        }

        .stock-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            align-items: center;
        }

        .stock-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            align-items: center;
            justify-content: flex-start;
        }

        .stock-card-header .stock-stats {
            flex: 1 1 auto;
        }

        .stock-stat {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            letter-spacing: 0.2px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .stock-stat.highlight {
            background: rgba(76, 175, 80, 0.2);
            color: #ffffff;
            font-weight: 600;
        }

        .stock-stat {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .stock-stat.up {
            color: #f44336;
            text-shadow: 0 1px 2px rgba(244, 67, 54, 0.3);
        }

        .stock-stat.down {
            color: #4CAF50;
            text-shadow: 0 1px 2px rgba(76, 175, 80, 0.3);
        }

        .stock-stat.highlight {
            color: #ffd700;
            text-shadow: 0 1px 2px rgba(255, 215, 0, 0.3);
        }

        .stock-stat.query-count {
            color: #4CAF50;
            font-weight: bold;
        }

        /* 加载和错误状态 */
        .loading-state {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 20px;
            grid-column: 1 / -1;
        }

        .error-state {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 20px;
            grid-column: 1 / -1;
        }

        .result-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .result-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.8;
            color: #555;
            overflow-x: auto;
            max-width: 100%;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #666;
            font-size: 14px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .multiple-results {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .multiple-results h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-item:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.25);
        }

        .result-item .stock-name {
            font-size: 17px;
            font-weight: 700;
            color: white;
            margin-bottom: 0;
            letter-spacing: 0.5px;
        }
        }

        .result-item .stock-code {
            font-size: 13px;
            color: #666;
        }

        @media (max-width: 768px) {
            .multiple-results {
                padding: 15px;
            }

            .multiple-results h3 {
                font-size: 14px;
            }

            .result-item {
                padding: 12px;
            }

            .result-item .stock-name {
                font-size: 14px;
            }

            .result-item .stock-code {
                font-size: 12px;
            }
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
        }

        .connection-info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .quick-examples {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .example-tag {
            background: #f0f0f0;
            color: #666;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }

        .example-tag:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tips {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }

        .donation-section {
            background: linear-gradient(135deg, #b71c1c 0%, #c62828 30%, #d32f2f 70%, #e53935 100%);
            border-radius: 16px;
            padding: 25px 20px;
            margin-top: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border: 3px solid #ffd700;
        }

        .donation-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px dashed rgba(255, 215, 0, 0.5);
            width: 100%;
        }

        .donation-greeting {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .donation-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ff0000, #ffd700, #ff0000, #ffd700);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .donation-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ff0000, #ffd700, #ff0000, #ffd700);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .donation-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px dashed rgba(255, 215, 0, 0.5);
            width: 100%;
            margin-bottom: 15px;
        }

        .donation-greeting {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 3px;
        }

        .donation-body {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .donation-left, .donation-right {
            flex: 1;
            height: 140px;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
        }

        .donation-scroll {
            position: absolute;
            width: 100%;
            animation: scrollUp 40s linear infinite;
        }

        @keyframes scrollUp {
            0% {
                transform: translateY(0%);
            }
            100% {
                transform: translateY(-50%);
            }
        }

        .donation-scroll-item {
            padding: 8px 0;
            font-size: 15px;
            color: #ffffff;
            font-weight: 600;
            line-height: 1.8;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .donation-left .donation-scroll-item {
            border-bottom: 1px dashed rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
            margin-bottom: 8px;
        }

        .donation-right .donation-scroll-item {
            border-bottom: 1px dashed rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
            margin-bottom: 8px;
        }

        .donation-center {
            flex: 1;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .donation-qr-container {
            width: 130px;
            height: 130px;
            background: white;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
            border: 3px solid #ffd700;
        }

        .donation-qr-code {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .donation-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .donation-text {
            font-size: 14px;
            color: #ffffff;
            line-height: 1.6;
            text-align: center;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 0, 0, 0.3);
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .donation-heart {
            font-size: 20px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .score-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .score-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .score-label {
            color: #666;
            font-size: 14px;
        }

        .score-value {
            font-weight: 600;
            font-size: 16px;
            color: white;
        }

        .score-value.high {
            color: #4CAF50;
        }

        .score-value.medium {
            color: #ff9800;
        }

        .score-value.low {
            color: #f44336;
        }

        .score-value.up {
            color: #f44336;
        }

        .score-value.down {
            color: #4CAF50;
        }

        .rating-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .rating-badge.excellent {
            background: #4CAF50;
        }

        .rating-badge.good {
            background: #2196F3;
        }

        .rating-badge.poor {
            background: #f44336;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .container {
                padding: 15px 10px;
                border-radius: 12px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 20px;
            }

            .emoji-icon {
                font-size: 36px;
                margin-bottom: 15px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .result-content {
                font-size: 13px;
                word-break: break-all;
            }

            .result-section {
                padding: 20px;
            }

            .status-bar {
                font-size: 11px;
                padding: 8px 10px;
                flex-direction: column;
                gap: 5px;
            }

            .quick-examples {
                gap: 6px;
            }

            .example-tag {
                font-size: 12px;
                padding: 5px 10px;
            }

            .tips {
                font-size: 11px;
                padding: 10px;
            }

            .connection-info {
                font-size: 10px;
            }

            .score-card {
                padding: 12px;
            }

            .score-label {
                font-size: 12px;
            }

            .score-value {
                font-size: 14px;
            }

            .donation-section {
                padding: 20px 15px;
            }

            .donation-header {
                margin-bottom: 10px;
            }

            .donation-greeting {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .donation-body {
                flex-direction: column;
                gap: 15px;
            }

            .donation-left, .donation-right {
                width: 100%;
                height: 100px;
            }

            .donation-center {
                width: 100%;
                min-width: auto;
            }

            .donation-scroll-item {
                font-size: 13px;
            }

            .donation-center {
                min-width: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>股票诊断分析</h1>
        <p class="subtitle">基于OpenClaw的AI分析，仅供娱乐</p>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot connecting" id="statusDot"></span>
                <span id="statusText">正在连接...</span>
            </div>
        </div>

        <div class="input-section">
            <label for="stockInput">输入股票代码（格式：000001.SZ 或 600000.SH）</label>
            <div class="input-group">
                <input type="text" id="stockInput" placeholder="例如：002594.SZ" value="002594.SZ" />
                <button id="analyzeBtn" onclick="analyzeStock()">分析诊断</button>
            </div>
            <div class="quick-examples">
                <span class="example-tag" onclick="quickSelect('002594.SZ')">比亚迪</span>
                <span class="example-tag" onclick="quickSelect('600519.SH')">贵州茅台</span>
                <span class="example-tag" onclick="quickSelect('300750.SZ')">宁德时代</span>
                <span class="example-tag" onclick="quickSelect('688981.SH')">中芯国际</span>
                <span class="example-tag" onclick="quickSelect('000858.SZ')">五粮液</span>
            </div>
        </div>

        <div id="errorContainer" style="display: none;"></div>

        <div class="result-section">
            <div class="result-title">📊 诊断结果</div>
            <div id="resultContent">
                <p style="color: #999; text-align: center;">请在上方输入股票代码进行分析</p>
            </div>

            <!-- 今日精选和查询统计并列展示区域 -->
            <div class="unified-wrapper">
                <!-- 今日精选区域 -->
                <div class="unified-section">
                    <!-- 今日精选标题 -->
                    <div class="unified-header">
                        <div class="unified-title">🏆 今日精选</div>
                    </div>

                    <!-- 今日精选股票列表 -->
                    <div class="top3-wrapper">
                        <div id="top3Content" class="top3-content">
                            <div class="loading-state">📊 正在加载今日精选数据...</div>
                        </div>
                    </div>
                </div>

                <!-- 查询统计区域 -->
                <div class="stats-section">
                    <!-- 查询统计标题 -->
                    <div class="stats-header">
                        <div class="stats-title">📊 查询统计</div>
                        <div class="stats-count">总查询: <span id="totalCount">0</span> 次</div>
                    </div>

                    <!-- 查询统计内容 -->
                    <div class="stats-content-wrapper">
                        <div class="stats-content" id="statsContent">
                            <div class="loading-state">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* 统一区域包装器（并列布局） */
        .unified-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        /* 统一区域样式（今日精选） */
        .unified-section {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95) 0%, rgba(40, 40, 50, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 12px;

        async function analyzeStock(code = null) {
            const rawCode = code || stockInput.value.trim();

            if (!rawCode) {
                showError('请输入股票代码或名称');
                return;
            }

            // 如果传入了代码，更新输入框显示
            if (code) {
                stockInput.value = code;
            }

            showLoading();
            hideError();

            try {
                // 创建超时控制器
                const createTimeoutController = (timeoutMs = 15000) => {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
                    return { controller, timeoutId };
                };

                // 第一步：识别股票代码
                let actualCode = rawCode;

                // 如果输入的不是标准的股票代码格式（6位数字.SZ/.SH），先进行识别
                if (!/^\d{6}\.(SZ|SH)$/.test(rawCode.toUpperCase())) {
                    const { controller: recController, timeoutId: recTimeoutId } = createTimeoutController(15000);
                    try {
                        const recognizeResponse = await fetch(`${API_BASE_URL}/api/recognize?q=${encodeURIComponent(rawCode)}`, {
                            signal: recController.signal
                        });
                        clearTimeout(recTimeoutId);

                        if (!recognizeResponse.ok) {
                            const recognizeData = await recognizeResponse.json();
                            showError(recognizeData.error || '股票识别失败');
                            resultContent.innerHTML = '';
                            return;
                        }

                        const recognizeData = await recognizeResponse.json();

                        // 如果有多个匹配结果，让用户选择
                        if (recognizeData.multiple) {
                            showMultipleResults(recognizeData.results, rawCode);
                            return;
                        }

                        // 使用识别到的股票代码
                        // 兼容两种返回格式：
                        // 1. 精确匹配：{ code: "xxx.SZ", multiple: false }
                        // 2. 模糊匹配（单结果）：{ results: [{ code: "xxx.SZ" }], count: 1, multiple: false }
                        if (recognizeData.code) {
                            actualCode = recognizeData.code;
                        } else if (recognizeData.results && recognizeData.results.length > 0) {
                            actualCode = recognizeData.results[0].code;
                        }
                        stockInput.value = actualCode;
                    } catch (recError) {
                        if (recError.name === 'AbortError') {
                            showError('请求超时，请检查网络连接');
                        } else {
                            throw recError;
                        }
                        resultContent.innerHTML = '';
                        return;
                    }
                }

                // 第二步：调用分析接口
                const { controller: anaController, timeoutId: anaTimeoutId } = createTimeoutController(30000); // 分析接口可能需要更长时间
                try {
                    const response = await fetch(`${API_BASE_URL}/api/analyze?code=${actualCode}`, {
                        signal: anaController.signal
                    });
                    clearTimeout(anaTimeoutId);

                    if (response.ok) {
                        const data = await response.json();
                        resultContent.innerHTML = formatAnalysisResult(data);
                    } else {
                        const data = await response.json();
                        showError(data.error || '分析失败');
                        resultContent.innerHTML = '';
                    }
                } catch (anaError) {
                    if (anaError.name === 'AbortError') {
                        showError('分析超时，请稍后重试');
                    } else {
                        throw anaError;
                    }
                    resultContent.innerHTML = '';
                    return;
                }
            } catch (error) {
                console.error('分析失败:', error);
                showError('网络错误：无法连接到分析服务。请检查网络连接或稍后重试。');
            }
        }

            let html = '<div class="multiple-results">';
            html += '<h3>找到多个匹配结果，请选择：</h3>';

            results.forEach(stock => {

            });

            html += '</div>';
            html += '</div>';

            resultContent.innerHTML = html;
        }

        // 页面加载时检查服务状态
        window.onload = async function() {
            updateStatus('connecting', '正在连接...');

            // 添加重试机制，最多重试2次
            let isHealthy = await checkHealth();
            if (!isHealthy) {
                console.log('第一次连接失败，正在重试...');
                await new Promise(resolve => setTimeout(resolve, 2000)); // 等待2秒

            if (isHealthy) {
                updateStatus('connected', '服务正常');
            } else {
                updateStatus('disconnected', '服务离线');
                showError('无法连接到分析服务。请确认后端服务已启动：python stock_service.py');
            }

            // 设置打赏二维码图片
            const qrImg = document.getElementById('donationQrCode');
            if (qrImg) {
                if (typeof DONATION_QR_CODE !== 'undefined') {
                    qrImg.src = DONATION_QR_CODE;
                } else {
                    qrImg.parentElement.innerHTML = '<span style="color: rgba(255,255,255,0.7);">二维码加载中...</span>';
                }
            }

            // 每10秒检查一次服务状态
            setInterval(async () => {
                const isHealthy = await checkHealth();
                if (isHealthy) {
                    updateStatus('connected', '服务正常');
                    hideError();
                } else {
                    updateStatus('disconnected', '服务离线');
                }
            }, 10000);
        };
    </script>

    <script src="qr_code.js"></script>
    <script>
        // 获取查询统计数据
        async function loadQueryStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/stats`);
                const data = await response.json();

                if (response.ok) {
                    // 更新总查询次数（桌面端和移动端）
                    document.getElementById('totalCount').textContent = data.total_count;
                    const totalCountMobile = document.getElementById('totalCountMobile');
                    if (totalCountMobile) {
                        totalCountMobile.textContent = data.total_count;
                    }

                    // 更新热门股票列表
                    const statsContentDiv = document.getElementById('statsContent');

                    if (data.top_stocks && data.top_stocks.length > 0) {
                        statsContentDiv.innerHTML = '';

                        data.top_stocks.forEach((stock, index) => {
                            const item = document.createElement('div');
                            item.className = 'stock-card';
                            item.onclick = () => analyzeStock(stock.code);

                            const rank = index + 1;
                            const rankEmoji = getRankEmoji(rank);

                            item.innerHTML = `
                                <div class="stock-card-header">
                                    <span class="stock-rank">${rankEmoji}</span>
                                    <div class="stock-info-left">
                                        <span class="stock-name" style="color: #ffffff;">${stock.name}</span>
                                        <span class="stock-code">${stock.code}</span>
                                    </div>
                                    <div class="stock-stats">
                                        <span class="stock-stat query-count">🔥 ${stock.count} 次查询</span>
                                    </div>
                                </div>
                            `;

                            statsContentDiv.appendChild(item);
                        });
                    } else {
                        statsContentDiv.innerHTML = '<div class="error-state">暂无查询记录</div>';
                    }
                } else {
                    console.error('获取统计数据失败:', data.error);
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 获取排名表情
        function getRankEmoji(rank) {
            const emojis = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣'];
            return emojis[rank - 1] || `${rank}.`;
        }

        // 页面加载时获取统计数据
        loadQueryStats();

        // 每次分析后刷新统计数据
        const originalAnalyzeStock = window.analyzeStock;
        window.analyzeStock = async function(code) {
            const result = await originalAnalyzeStock(code);
            // 延迟1秒后刷新统计数据，确保后端已更新
            setTimeout(loadQueryStats, 1000);
            return result;
        };

        // 加载今日精选股票数据
        async function loadTop3Stocks() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/top3-today`);
                const data = await response.json();

                if (response.ok && data.status === 'ok') {
                    displayTop3Stocks(data.stocks);
                } else {
                    displayTop3Error(data.error || '加载今日精选数据失败');
                }
            } catch (error) {
                console.error('加载今日精选数据失败:', error);
                displayTop3Error('网络错误：无法加载今日精选数据');
            }
        }

        // 显示今日精选股票数据
        function displayTop3Stocks(stocks) {
            const top3Content = document.getElementById('top3Content');

            if (!stocks || stocks.length === 0) {
                displayTop3Error('暂无今日精选数据');
                return;
            }

            let html = '';

            stocks.forEach(stock => {
                const rankEmoji = getRankEmoji(stock.rank);
                const isUp = stock.pct_chg > 0;
                const isDown = stock.pct_chg < 0;
                const totalMv = stock.total_mv ? stock.total_mv.toFixed(1) : '0.0';

                html += `
                    <div class="stock-card gold-theme" onclick="quickSelect('${stock.code}')">
                        <div class="stock-card-header">
                            <span class="stock-rank">${rankEmoji}</span>
                            <div class="stock-info-left">
                                <span class="stock-name">${stock.name}</span>
                                <span class="stock-code">${stock.code}</span>
                            </div>
                            <div class="stock-stats">
                                <span class="stock-stat highlight">${stock.overall_score.toFixed(1)}分</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 11px;">
                            <span class="stock-stat">价格: ${stock.price.toFixed(2)}元</span>
                            <span class="stock-stat ${isUp ? 'up' : ''} ${isDown ? 'down' : ''}">${stock.pct_chg > 0 ? '+' : ''}${stock.pct_chg.toFixed(2)}%</span>
                            <span class="stock-stat">市值: ${totalMv}亿</span>
                        </div>
                    </div>
                `;
            });

            top3Content.innerHTML = html;
        }

        // 显示今日精选错误信息
        function displayTop3Error(message) {
            const top3Content = document.getElementById('top3Content');
            top3Content.innerHTML = `
                <div class="error-state">
                    <div style="font-size: 24px; margin-bottom: 10px;">⚠️</div>
                    <div>${message}</div>
                </div>
            `;
        }

        // 获取排名表情
        function getRankEmoji(rank) {
            const emojis = ['🥇', '🥈', '🥉'];
            return emojis[rank - 1] || `${rank}.`;
        }

        // 舆情分析功能
        async function analyzeSentiment() {
            const code = stockInput.value.trim();
            if (!code) {
                alert('请先输入股票代码进行分析');
                return;
            }

            const btn = document.getElementById('analyzeSentimentBtn');
            const resultDiv = document.getElementById('sentiment-result');

            // 显示加载状态
            btn.disabled = true;
            btn.textContent = '分析中...';
            resultDiv.style.display = 'none';

            try {
                // 调用后端API
                const response = await fetch(`${API_BASE_URL}/api/sentiment?code=${encodeURIComponent(code)}`);
                const data = await response.json();

                if (response.ok && data.status === 'ok') {
                    // 更新舆情评分
                    document.getElementById('sentiment-score').textContent = `${data.sentiment_score}分`;
                    document.getElementById('sentiment-score').className = `score-value ${data.sentiment_score >= 80 ? 'high' : data.sentiment_score >= 60 ? 'medium' : 'low'}`;

                    // 更新舆情倾向
                    document.getElementById('sentiment-trend').textContent = data.sentiment_trend;
                    document.getElementById('sentiment-trend').className = `score-value ${data.sentiment_score >= 80 ? 'high' : data.sentiment_score >= 60 ? 'medium' : 'low'}`;

                    // 绘制趋势图
                    drawSentimentChart(data.trend_data);

                    // 显示热门评论
                    displaySentimentComments(data.comments);

                    resultDiv.style.display = 'block';
                } else {
                    throw new Error(data.error || '舆情分析失败');
                }
            } catch (error) {
                console.error('舆情分析失败:', error);
                resultDiv.innerHTML = `<div style="color: #f44336; text-align: center; padding: 20px;">舆情分析失败：${error.message}</div>`;
                resultDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '分析舆情';
            }
        }

        // 生成趋势数据
        function generateTrendData() {
            const data = [];
            const baseValue = Math.random() * 20 + 40; // 40-60基础值
            for (let i = 0; i < 7; i++) {
                const value = baseValue + Math.random() * 30 - 10; // 随机波动
                data.push({
                    date: `3月${9 - i}日`,
                    value: Math.max(0, Math.min(100, Math.floor(value)))
                });
            }
            return data.reverse(); // 按时间正序
        }

        // 绘制趋势图（使用Canvas）
        function drawSentimentChart(data) {
            const canvas = document.getElementById('sentiment-chart');
            if (!canvas) return;

            // 设置Canvas尺寸
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            const width = canvas.width;
            const height = canvas.height;
            const padding = 40;

            // 清空画布
            ctx.clearRect(0, 0, width, height);

            // 绘制背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, width, height);

            // 绘制网格线
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (height - 2 * padding) * (1 - i / 5);
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }

            // 绘制数据线
            if (data.length > 0) {
                const stepX = (width - 2 * padding) / (data.length - 1);
                const stepY = (height - 2 * padding) / 100;

                ctx.beginPath();
                ctx.strokeStyle = sentimentScore >= 80 ? '#4CAF50' : sentimentScore >= 60 ? '#ff9800' : '#f44336';
                ctx.lineWidth = 2;

                data.forEach((point, index) => {
                    const x = padding + index * stepX;
                    const y = height - padding - point.value * stepY;

                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });

                ctx.stroke();

                // 绘制数据点
                data.forEach((point, index) => {
                    const x = padding + index * stepX;
                    const y = height - padding - point.value * stepY;

                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = sentimentScore >= 80 ? '#4CAF50' : sentimentScore >= 60 ? '#ff9800' : '#f44336';
                    ctx.fill();
                });
            }

            // 绘制坐标轴文字
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';

            // X轴日期
            data.forEach((point, index) => {
                const x = padding + index * ((width - 2 * padding) / (data.length - 1));
                ctx.fillText(point.date, x, height - 10);
            });

            // Y轴数值
            for (let i = 0; i <= 5; i++) {
                const value = i * 20;
                const y = height - padding - value * ((height - 2 * padding) / 100);
                ctx.textAlign = 'right';
                ctx.fillText(value.toString(), padding - 5, y + 4);
            }
        }

        // 生成模拟评论
        function generateComments(code) {
            const positiveComments = [
                { content: '这只股票表现不错，值得长期持有！', author: '投资者A', time: '2小时前', like: 128 },
                { content: '财报数据超出预期，未来可期', author: '股神B', time: '3小时前', like: 95 },
                { content: '技术面走势良好，支撑位稳固', author: '分析师C', time: '5小时前', like: 76 },
                { content: '公司基本面扎实，持续看好', author: '价值投资D', time: '6小时前', like: 64 },
                { content: '今日成交量放大，资金进场明显', author: '短线高手E', time: '8小时前', like: 52 }
            ];

            const neutralComments = [
                { content: '短期震荡，建议观望', author: '理性投资者F', time: '1小时前', like: 89 },
                { content: '走势平稳，等待进一步信号', author: '技术分析G', time: '4小时前', like: 72 },
                { content: '市场情绪一般，保持谨慎', author: '稳健派H', time: '7小时前', like: 58 }
            ];

            const negativeComments = [
                { content: '今日调整，注意风险', author: '风险意识I', time: '30分钟前', like: 145 },
                { content: '短期承压，建议减仓', author: '保守派J', time: '2小时前', like: 98 },
                { content: '上方压力较大，冲高回落', author: '谨慎派K', time: '4小时前', like: 76 }
            ];

            // 随机选择评论组合
            const allComments = [...positiveComments, ...neutralComments, ...negativeComments];
            const selectedComments = allComments.sort(() => Math.random() - 0.5).slice(0, 8);

            return selectedComments;
        }

        // 显示热门评论
        function displaySentimentComments(comments) {
            const commentsDiv = document.getElementById('sentiment-comments');
            if (!commentsDiv) return;

            if (comments.length === 0) {
                commentsDiv.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">暂无评论数据</div>';
                return;
            }

            let html = '';
            comments.forEach(comment => {
                html += `
                    <div style="background: #f8f9fa; border-radius: 6px; padding: 10px; margin-bottom: 8px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                            <span style="font-weight: 600; font-size: 13px;">${comment.author}</span>
                            <span style="color: #999; font-size: 12px;">${comment.time}</span>
                        </div>
                        <div style="font-size: 13px; color: #333; margin-bottom: 6px;">${comment.content}</div>
                        <div style="color: #666; font-size: 12px;">👍 ${comment.like}</div>
                    </div>
                `;
            });

            commentsDiv.innerHTML = html;
        }

        // 页面加载时获取今日精选股票数据
        loadTop3Stocks();

        // 每10分钟刷新一次今日精选数据
        setInterval(loadTop3Stocks, 600000);

        // 绑定舆情分析按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            const analyzeBtn = document.getElementById('analyzeSentimentBtn');
            if (analyzeBtn) {
                analyzeBtn.addEventListener('click', analyzeSentiment);
            }
        });

        // 绑定查看报告按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            const viewReportBtn = document.getElementById('viewReportBtn');
            if (viewReportBtn) {
                viewReportBtn.addEventListener('click', function() {
                    const reportContent = document.getElementById('report-content');
                    if (reportContent) {
                        reportContent.style.display = reportContent.style.display === 'none' ? 'block' : 'none';
                    }
                });
            }
        });

        // 存储当前舆情评分用于绘图
        let sentimentScore = 70;
    </script>
