<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-width: 320px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 添加背景动画粒子效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(102, 126, 234, 0.1) inset;
            max-width: 800px;
            width: 100%;
            padding: 30px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* 添加装饰性光晕 */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.03) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(224, 224, 224, 0.8);
            letter-spacing: 0.5px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: #e0e0e0;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        input[type="text"]:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15),
                        0 8px 24px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        input[type="text"]:hover {
            border-color: rgba(102, 126, 234, 0.4);
        }

        button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        /* 按钮光效动画 */
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653b91 100%);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5),
                        0 0 40px rgba(102, 126, 234, 0.2);
        }

        button:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: linear-gradient(135deg, #4a4a6a 0%, #3a3a5a 100%);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        button:disabled::before {
            display: none;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.08) 100%);
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid rgba(102, 126, 234, 0.15);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .status-bar:hover {
            border-color: rgba(102, 126, 234, 0.25);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.1);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.8);
        }

        .status-dot.disconnected {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.8);
        }

        .status-dot.busy {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            box-shadow: 0 0 12px rgba(243, 156, 18, 0.8);
        }

        .status-dot.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.8);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        .result-section {
            min-height: 200px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-radius: 16px;
            padding: 24px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            font-size: 14px;
            line-height: 2;
            color: #e0e0e0;
            overflow-x: auto;
            max-width: 100%;
            box-shadow: inset 0 2px 12px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* 结果区域的光效 */
        .result-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.5), transparent);
        }

        .result-section p {
            margin: 0;
            padding: 0;
        }

        .error-message {
            color: #ff6b6b;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.12) 0%, rgba(192, 57, 43, 0.08) 100%);
            padding: 16px 20px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 14px;
            border-left: 4px solid #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.25);
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 4px 16px rgba(231, 76, 60, 0.15);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TOP3精选股票样式 */
        .top3-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, rgba(102, 126, 234, 0.5) 0%, transparent 100%);
            border-image-slice: 1;
            letter-spacing: 0.5px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 1px;
        }

        .top3-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .top3-item {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #ffffff;
            padding: 18px 22px;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.25),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .top3-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .top3-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4),
                        0 0 0 2px rgba(102, 126, 234, 0.6) inset;
            border-color: rgba(102, 126, 234, 0.8);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.18) 100%);
        }

        .top3-item:hover::before {
            opacity: 1;
        }

        .top3-rank {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5),
                        0 0 0 2px rgba(255, 255, 255, 0.2) inset;
            min-width: 50px;
            text-align: center;
            z-index: 1;
            position: relative;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .top3-stock-name {
            font-size: 19px;
            font-weight: 700;
            color: #ffffff;
            flex: 1;
            z-index: 1;
            position: relative;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .top3-stock-code {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.15) 100%);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 14px;
            color: #ffffff;
            border: 2px solid rgba(102, 126, 234, 0.5);
            z-index: 1;
            position: relative;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        /* 统计信息卡片 - 桌面端横向排列 */
        .stats-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin-top: 25px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        /* 统计卡片装饰性光晕 */
        .stats-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .stats-items {
            display: flex;
            gap: 18px;
            justify-content: space-around;
            position: relative;
            z-index: 1;
        }

        .stats-item {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 18px 20px;
            text-align: center;
            flex: 1;
            min-width: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .stats-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.18);
        }

        .stats-label {
            color: rgba(255, 255, 255, 0.95);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .stats-value {
            color: white;
            font-weight: 800;
            font-size: 22px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            letter-spacing: -0.5px;
        }

        .examples {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .example {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(224, 224, 224, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }

        .example::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 0;
        }

        .example span {
            position: relative;
            z-index: 1;
        }

        .example:hover {
            color: white;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            border-color: transparent;
        }

        .example:hover::before {
            opacity: 1;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(224, 224, 224, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            color: rgba(224, 224, 224, 0.5);
            padding: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .loading::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* 排行榜样式 */
        .ranking-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ranking-item {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12) 0%, rgba(118, 75, 162, 0.08) 100%);
            color: #ffffff;
            padding: 18px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .ranking-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ranking-item:hover {
            transform: translateX(10px) scale(1.01);
            box-shadow: 0 10px 35px rgba(102, 126, 234, 0.35),
                        0 0 0 3px rgba(102, 126, 234, 0.4) inset;
            border-color: rgba(102, 126, 234, 0.7);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.12) 100%);
        }

        .ranking-item:hover::before {
            opacity: 1;
        }

        .ranking-rank {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 18px;
            border-radius: 28px;
            font-weight: 800;
            font-size: 16px;
            min-width: 70px;
            text-align: center;
            margin-right: 14px;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5),
                        0 0 0 2px rgba(255, 255, 255, 0.2) inset;
            z-index: 1;
            position: relative;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .ranking-rank.top1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
            box-shadow: 0 6px 24px rgba(255, 215, 0, 0.6),
                        0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        .ranking-rank.top2 {
            background: linear-gradient(135deg, #e8e8e8 0%, #b8b8b8 100%);
            box-shadow: 0 6px 20px rgba(192, 192, 192, 0.5),
                        0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        .ranking-rank.top3 {
            background: linear-gradient(135deg, #e8943a 0%, #d4720f 100%);
            box-shadow: 0 6px 20px rgba(205, 127, 50, 0.5),
                        0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        .ranking-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1;
            position: relative;
        }

        .ranking-stock-name {
            font-weight: 700;
            font-size: 17px;
            color: #ffffff;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .ranking-stock-code {
            font-size: 13px;
            font-weight: 600;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.5px;
        }

        .ranking-count {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 2px solid rgba(102, 126, 234, 0.5);
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 20px;
            color: #ffffff;
            z-index: 1;
            position: relative;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* 移动端优化 */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 18px 12px;
                border-radius: 16px;
            }

            .section-title {
                font-size: 18px;
                margin-bottom: 18px;
            }

            .section-title::after {
                width: 50px;
            }

            /* TOP3移动端优化 */
            .top3-item {
                padding: 14px 16px;
                gap: 12px;
                border-width: 2px;
            }

            .top3-rank {
                padding: 6px 12px;
                font-size: 14px;
                min-width: 40px;
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            }

            .top3-stock-name {
                font-size: 16px;
                font-weight: 700;
            }

            .top3-stock-code {
                padding: 5px 10px;
                font-size: 12px;
                border-width: 1px;
                font-weight: 600;
            }

            .input-group {
                flex-direction: column;
                gap: 10px;
            }

            input[type="text"] {
                padding: 14px 16px;
            }

            button {
                width: 100%;
                padding: 14px 24px;
            }

            .result-section {
                font-size: 13px;
                padding: 16px;
                word-break: break-all;
                line-height: 1.8;
            }

            .status-bar {
                font-size: 12px;
                padding: 10px 12px;
            }

            .status-dot {
                width: 10px;
                height: 10px;
            }

            .examples {
                gap: 6px;
            }

            .example {
                font-size: 12px;
                padding: 6px 12px;
                border-radius: 20px;
            }

            .stats-container {
                padding: 16px !important;
                margin-top: 20px !important;
                width: 100% !important;
                box-sizing: border-box !important;
                border-radius: 14px !important;
            }

            .stats-items {
                flex-direction: column !important;
                gap: 10px !important;
                width: 100% !important;
            }

            .stats-item {
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                text-align: left !important;
                padding: 14px 16px !important;
                min-height: 52px !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .stats-label {
                font-size: 13px !important;
                margin-bottom: 0 !important;
                flex: 0 0 auto;
                letter-spacing: 0.8px !important;
            }

            .stats-value {
                font-size: 20px !important;
                flex: 0 0 auto;
            }

            .ranking-item {
                padding: 14px 16px;
                border-width: 1px;
            }

            .ranking-rank {
                min-width: 58px;
                padding: 8px 14px;
                font-size: 14px;
                margin-right: 10px;
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            }

            .ranking-stock-name {
                font-size: 16px;
                font-weight: 700;
            }

            .ranking-stock-code {
                font-size: 12px;
                font-weight: 600;
            }

            .ranking-count {
                font-size: 18px;
                padding: 7px 12px;
                border-width: 1px;
                font-weight: 800;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <span class="status-dot connected" id="statusDot"></span>
            <span id="statusText">API 已就绪</span>
        </div>

        <div class="input-section">
            <label for="stockInput">输入股票名称或代码</label>
            <div class="input-group">
                <input type="text" id="stockInput" placeholder="例如：比亚迪 或 002594" />
                <button id="analyzeBtn" onclick="analyze()">分析</button>
            </div>
            <div class="examples">
                <span class="example" onclick="quickSelect('比亚迪')"><span>比亚迪</span></span>
                <span class="example" onclick="quickSelect('贵州茅台')"><span>贵州茅台</span></span>
                <span class="example" onclick="quickSelect('宁德时代')"><span>宁德时代</span></span>
                <span class="example" onclick="quickSelect('002594')"><span>002594</span></span>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div class="result-section" id="result">
            <p style="color: #999; text-align: center;">请在上方输入股票进行分析</p>
        </div>

        <!-- 股票精选TOP8 -->
        <div class="top3-section">
            <h3 class="section-title">📈 今日精选TOP8</h3>
            <div class="top3-container" id="top3Container">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 查询次数排行榜TOP10 -->
        <div class="top3-section">
            <h3 class="section-title">📊 查询次数排行榜TOP10</h3>
            <div class="ranking-container" id="rankingContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 统计信息卡片 -->
        <div class="stats-container">
            <div class="stats-items">
                <div class="stats-item">
                    <div class="stats-label">日期</div>
                    <div class="stats-value" id="statsDate">加载中...</div>
                </div>
                <div class="stats-item">
                    <div class="stats-label">日期</div>
                    <div class="stats-value" id="statsDate">加载中...</div>
                </div>
                <div class="stats-item">
                    <div class="stats-label">股票数量</div>
                    <div class="stats-value" id="statsStockCount">0</div>
                </div>
                <div class="stats-item">
                    <div class="stats-label">总查询次数</div>
                    <div class="stats-value" id="statsTotalCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stockInput = document.getElementById('stockInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const result = document.getElementById('result');
        const errorContainer = document.getElementById('errorContainer');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const debugInfo = document.getElementById('debugInfo');
        const apiUrl = document.getElementById('apiUrl');
        const lastRequest = document.getElementById('lastRequest');
        const lastResponse = document.getElementById('lastResponse');
        const lastStatus = document.getElementById('lastStatus');

        // 统计信息元素
        const statsDate = document.getElementById('statsDate');
        const statsStockCount = document.getElementById('statsStockCount');
        const statsTotalCount = document.getElementById('statsTotalCount');

        // 请求超时时间（30秒）
        const REQUEST_TIMEOUT = 30000;

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    const data = await response.json();
                    const stockQueries = data.stock_queries || {};
                    
                    // 计算总查询次数和股票数量
                    let totalCount = 0;
                    for (const code in stockQueries) {
                        totalCount += (stockQueries[code].count || 0);
                    }
                    
                    const stockCount = Object.keys(stockQueries).length;
                    const today = new Date().toISOString().split('T')[0];

                    statsDate.textContent = today;
                    statsStockCount.textContent = stockCount;
                    statsTotalCount.textContent = totalCount.toLocaleString();
                } else {
                    console.error('获取统计数据失败');
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载TOP8精选股票
        async function loadTop8() {
            const top3Container = document.getElementById('top3Container');
            try {
                top3Container.innerHTML = '<div class="loading">加载中...</div>';

                // 调用后端API获取TOP8
                const response = await fetch('/api/top3?limit=8');
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.stocks && data.stocks.length > 0) {
                        top3Container.innerHTML = '';
                        
                        data.stocks.forEach((stock, index) => {
                            const top3Item = document.createElement('div');
                            top3Item.className = 'top3-item';
                            top3Item.onclick = () => {
                                stockInput.value = stock.ts_code;
                                analyze();
                            };

                            top3Item.innerHTML = `
                                <span class="top3-rank">${index + 1}</span>
                                <span class="top3-stock-name">${stock.name || stock.ts_code}</span>
                                <span class="top3-stock-code">${stock.ts_code || stock.code}</span>
                            `;

                            top3Container.appendChild(top3Item);
                        });
                    } else {
                        top3Container.innerHTML = '<div class="loading">暂无精选数据</div>';
                    }
                } else {
                    console.error('获取TOP3失败');
                    top3Container.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
                }
            } catch (error) {
                console.error('加载TOP3失败:', error);
                top3Container.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
            }
        }

        // 加载查询次数排行榜
        async function loadRanking() {
            const rankingContainer = document.getElementById('rankingContainer');
            try {
                rankingContainer.innerHTML = '<div class="loading">加载中...</div>';

                const response = await fetch('/api/stats');
                if (response.ok) {
                    const data = await response.json();
                    const stockQueries = data.stock_queries || {};

                    // 转换为数组并按查询次数排序
                    const rankingArray = Object.entries(stockQueries)
                        .map(([code, info]) => ({
                            code: code,
                            name: info.name || code,
                            count: info.count || 0
                        }))
                        .sort((a, b) => b.count - a.count)
                        .slice(0, 10); // 取前10名

                    if (rankingArray.length > 0) {
                        rankingContainer.innerHTML = '';

                        rankingArray.forEach((item, index) => {
                            const rank = index + 1;
                            let rankClass = '';

                            if (rank === 1) rankClass = 'top1';
                            else if (rank === 2) rankClass = 'top2';
                            else if (rank === 3) rankClass = 'top3';

                            const rankingItem = document.createElement('div');
                            rankingItem.className = 'ranking-item';
                            rankingItem.onclick = () => {
                                stockInput.value = item.code;
                                analyze();
                            };

                            rankingItem.innerHTML = `
                                <div class="ranking-rank ${rankClass}">#${rank}</div>
                                <div class="ranking-info">
                                    <div class="ranking-stock-name">${item.name}</div>
                                    <div class="ranking-stock-code">${item.code}</div>
                                </div>
                                <div class="ranking-count">${item.count}</div>
                            `;

                            rankingContainer.appendChild(rankingItem);
                        });
                    } else {
                        rankingContainer.innerHTML = '<div class="loading">暂无排行榜数据</div>';
                    }
                } else {
                    console.error('获取排行榜数据失败');
                    rankingContainer.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
                rankingContainer.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
            }
        }

        // 格式化分析结果
        function formatAnalysisResult(data) {
            if (!data || data.error) {
                return `分析失败：${data?.error || '未知错误'}`;
            }

            let result = '';

            // 标题
            result += `${data.name}（${data.ts_code}）\n`;
            result += `═════════════════════════════════\n\n`;

            // 基本信息
            result += `【基本信息】\n`;
            result += `最新价格：${data.price.toFixed(2)}元\n`;
            result += `涨跌幅：${data.pct_chg > 0 ? '+' : ''}${data.pct_chg.toFixed(2)}%\n`;
            result += `行业：${data.industry}\n`;
            result += `市值：${data.total_mv.toFixed(2)}亿元\n`;
            result += `交易日期：${data.trade_date}\n\n`;

            // 技术面
            result += `【技术面分析】\n`;
            result += `• 250日均线：${data.ma250.toFixed(2)}元 `;
            result += data.price_above_ma250 ? '✅ 站上均线' : '❌ 跌破均线';
            result += `\n`;
            result += `• 缠论买点：${data.buy_point_type}（得分：${data.buy_point_score}）\n`;
            result += `• 技术面得分：${data.short_term_score.toFixed(1)}分\n\n`;

            // 综合评分
            result += `【综合评分】\n`;
            result += `• 长期得分：${data.long_term_score.toFixed(1)}分`;
            result += `（成长系数：${data.growth_coeff}）\n`;
            result += `• 中期得分：${data.mid_term_score.toFixed(1)}分\n`;
            result += `• 短期得分：${data.short_term_score.toFixed(1)}分\n`;
            result += `• 综合得分：${data.overall_score.toFixed(2)}分\n`;
            result += `• 赢面率：${(data.win_rate * 100).toFixed(2)}%\n`;
            result += `• 涨停次数：近10天${data.limit_up_count}次\n\n`;

            // 操作建议
            result += `【操作建议】\n`;
            result += `💡 ${data.position_advice}\n`;

            return result;
        }

        // 规范化股票代码格式
        function normalizeStockCode(code) {
            // 去除前后空格并转大写
            code = code.trim().toUpperCase();

            // 如果已经包含后缀，直接返回
            if (code.endsWith('.SZ') || code.endsWith('.SH')) {
                return code;
            }

            // 如果是6位纯数字，自动补充后缀
            if (/^\d{6}$/.test(code)) {
                const firstDigit = code.charAt(0);
                if (firstDigit === '0' || firstDigit === '2' || firstDigit === '3') {
                    return code + '.SZ';  // 深圳股票
                } else if (firstDigit === '6') {
                    return code + '.SH';  // 上海股票
                }
            }

            // 不是6位数字，可能是股票名称或其他格式，直接返回原值
            return code;
        }

        async function analyze() {
            const stock = stockInput.value.trim();

            if (!stock) {
                showError('请输入股票名称或代码');
                return;
            }

            // 规范化股票代码
            const normalizedStock = normalizeStockCode(stock);
            if (normalizedStock !== stock) {
                // 如果代码被规范化，更新输入框显示
                stockInput.value = normalizedStock;
            }

            setLoading(true);
            hideError();
            debugInfo.style.display = 'block';

            // 构造后端API URL
            const backendApiUrl = `/api/analyze?code=${encodeURIComponent(normalizedStock)}`;

            // 更新调试信息
            apiUrl.textContent = backendApiUrl;
            lastRequest.textContent = `GET ${backendApiUrl}`;

            try {
                // 使用 AbortController 实现超时
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                }, REQUEST_TIMEOUT);

                const response = await fetch(backendApiUrl, {
                    method: 'GET',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error('HTTP 错误: ' + response.status);
                }

                const data = await response.json();

                // 更新调试信息
                lastStatus.textContent = response.status;
                lastResponse.textContent = JSON.stringify(data, null, 2).substring(0, 300) + '...';

                if (data.error) {
                    showError('分析失败: ' + data.error);
                    updateStatus('error', '请求失败');
                } else {
                    // 格式化分析结果
                    const formattedResult = formatAnalysisResult(data);
                    result.textContent = formattedResult;
                    updateStatus('connected', '分析完成');
                }
            } catch (error) {
                console.error('请求失败:', error);

                if (error.name === 'AbortError') {
                    showError('请求超时（30秒），请重试');
                    updateStatus('busy', '请求超时');
                } else {
                    showError('请求失败：' + error.message);
                    updateStatus('error', '网络错误');
                }

                lastStatus.textContent = error.name || '未知错误';
            } finally {
                setLoading(false);
            }
        }

        function updateStatus(status, text) {
            statusDot.className = 'status-dot ' + status;
            statusText.textContent = text;
        }

        function setLoading(loading) {
            analyzeBtn.disabled = loading;
            analyzeBtn.textContent = loading ? '分析中...' : '分析';
        }

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function hideError() {
            errorContainer.innerHTML = '';
        }

        function quickSelect(stock) {
            stockInput.value = stock;
            stockInput.focus();
        }

        // 回车键快捷分析
        stockInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyze();
            }
        });

        // 页面加载时检查连接
        window.onload = function() {
            console.log('页面已加载');
            // 加载统计数据
            loadStats();
            // 加载TOP8精选股票
            loadTop8();
            // 加载查询次数排行榜
            loadRanking();
            // 连接测试：使用后端健康检查端点
            fetch('/api/health', {
                method: 'GET',
                signal: AbortSignal.timeout(5000)
            }).then(response => {
                if (response.ok) {
                    updateStatus('connected', 'API 正常');
                } else {
                    updateStatus('disconnected', 'API 不可用');
                }
            }).catch(error => {
                console.error('连接测试失败:', error);
                updateStatus('disconnected', '网络错误');
            });
        };
    </script>
</body>
</html>
